    <style>
        body{}
        .menu-item{font-weight:600;}
        .singleLine{
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
            overflow:hidden;text-overflow:ellipsis;white-space:normal;
            text-align:center;margin:15px auto;height:45px;font-weight:600;
        }
        .page-title{padding:30px 0 20px;font-size:24px;font-weight:700;color:#333;text-align:center;}
        .page-title.dark{color:#fff;}
        .empty-tip{text-align:center;padding:80px 0;color:#aaa;font-size:16px;}
        .delete-btn{
            position:absolute;top:8px;right:8px;z-index:10;
            width:28px;height:28px;border-radius:50%;
            background:rgba(0,0,0,0.6);border:none;color:#fff;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            opacity:0;transition:opacity 0.2s;
        }
        .masonry-item:hover .delete-btn{opacity:1;}
        .delete-btn:hover{background:rgba(220,50,50,0.8);}
        .masonry-image{transition:transform .3s ease,opacity .3s ease;}
        .masonry-item:hover .masonry-image{transform:scale(1.03);}
        html.nice-dark-mode body,body.nice-dark-mode{background-color:var(--dark-bg-body,#1a1a1a)!important;}
        html.nice-dark-mode .light.iconfont{display:none!important;}
        html.nice-dark-mode .dark.iconfont{display:flex!important;}
    </style>
